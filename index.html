<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Service</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #1e2a38;
    color: white;
}

.header {
    background: #d32f2f;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

.container {
    padding: 20px;
}

label {
    display: block;
    margin: 5px 0;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

.submit {
    background: #2ecc71;
}

.box {
    margin-top: 15px;
    padding: 15px;
    background: #2f3e4e;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="header">Hotel Service</div>

<div class="container">

<h3>Select Services</h3>

<label><input type="checkbox" value="Housekeeping"> Housekeeping</label>
<label><input type="checkbox" value="Maintenance"> Maintenance</label>
<label><input type="checkbox" value="Food"> Food</label>
<label><input type="checkbox" value="Laundry"> Laundry</label>
<label><input type="checkbox" value="Emergency"> Emergency</label>

<button class="submit" onclick="submitRequest()">Submit Request</button>

<div id="statusBox" class="box">Status will appear here</div>

</div>

<script>

// 🔹 Get room number from URL
function getRoom() {
    const params = new URLSearchParams(window.location.search);
    return params.get("room") || "101";
}

// 🔹 Submit request
function submitRequest() {

    let selected = [];
    document.querySelectorAll("input[type=checkbox]:checked").forEach(el => {
        selected.push(el.value);
    });

    if (selected.length === 0) {
        alert("Please select at least one service");
        return;
    }

    const requestId = "REQ-" + Date.now();
    const room = getRoom();

    const data = {
        request_id: requestId,
        room_number: room,
        services: selected
    };

    console.log("Sending:", data);

    fetch("https://easeguest.app.n8n.cloud/webhook/15574ed5-1014-4178-808e-c73265f27b8f", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(response => {
        console.log("Response:", response);
        document.getElementById("statusBox").innerHTML =
            "✅ Request Sent<br>ID: " + requestId;
    })
    .catch(error => {
        console.error("Error:", error);
        document.getElementById("statusBox").innerHTML =
            "❌ Failed to send request (check console)";
    });
}

</script>

</body>
</html>

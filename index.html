<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Service</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #1e2a38;
    color: white;
}

.header {
    background: #d32f2f;
    padding: 15px;
    text-align: center;
    font-size: 22px;
}

.container {
    padding: 20px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
}

.submit {
    background: #2ecc71;
}

.status {
    background: #3498db;
}

.box {
    margin-top: 15px;
    padding: 15px;
    background: #2f3e4e;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="header">Hotel Service</div>

<div class="container">

<h3>Select Services</h3>

<label><input type="checkbox" value="Housekeeping"> Housekeeping</label><br>
<label><input type="checkbox" value="Maintenance"> Maintenance</label><br>
<label><input type="checkbox" value="Food"> Food</label><br>
<label><input type="checkbox" value="Laundry"> Laundry</label><br>
<label><input type="checkbox" value="Emergency"> Emergency</label><br>

<button class="submit" onclick="submitRequest()">Submit Request</button>
<button class="status" onclick="checkStatus()">Check Status</button>

<div id="statusBox" class="box">Status will appear here</div>

</div>

<script>

let currentRequestID = null;

// 🔹 Get room from URL (?room=101)
function getRoomNumber() {
    const params = new URLSearchParams(window.location.search);
    return params.get("room") || "101";
}

// 🔹 Generate ID
function generateID() {
    return "REQ-" + Date.now();
}

// 🔹 Submit Request
function submitRequest() {

    let selected = [];
    document.querySelectorAll("input[type=checkbox]:checked")
        .forEach(el => selected.push(el.value));

    if (selected.length === 0) {
        alert("Please select at least one service");
        return;
    }

    const room = getRoomNumber();
    currentRequestID = generateID();

    fetch("https://easeguest.app.n8n.cloud/webhook/15574ed5-1014-4178-808e-c73265f27b8f", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            request_id: currentRequestID,
            room_number: room,
            services: selected,
            status: "Pending",
            time: new Date().toISOString()
        })
    })
    .then(() => {
        document.getElementById("statusBox").innerHTML =
            "✅ Request Sent<br>ID: " + currentRequestID + "<br>Status: Pending";
    })
    .catch(err => {
        console.error(err);
        alert("Error sending request");
    });
}

// 🔹 Check Status (dummy for now)
function checkStatus() {

    if (!currentRequestID) {
        alert("Submit request first");
        return;
    }

    document.getElementById("statusBox").innerHTML =
        "🔄 Checking status for " + currentRequestID;
}

</script>

</body>
</html>

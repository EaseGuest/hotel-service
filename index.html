<!DOCTYPE html>
<html>
<head>
  <title>Hotel Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; background:#1f2d3d; color:white; padding:20px; }
    h2 { text-align:center; }
    .btn { width:100%; padding:15px; margin-top:10px; border:none; border-radius:5px; font-size:16px; }
    .submit { background:#28a745; color:white; }
    .status { background:#34495e; padding:15px; margin-top:15px; border-radius:5px; }
  </style>
</head>

<body>

<h2>Hotel Service</h2>

<h3>Select Services</h3>

<label><input type="checkbox" value="Housekeeping"> Housekeeping</label><br>
<label><input type="checkbox" value="Maintenance"> Maintenance</label><br>
<label><input type="checkbox" value="Food"> Food</label><br>
<label><input type="checkbox" value="Laundry"> Laundry</label><br>
<label><input type="checkbox" value="Emergency"> Emergency</label><br>

<button class="btn submit" onclick="submitRequest()">Submit Request</button>

<div id="statusBox" class="status">Status will appear here</div>

<script>
function submitRequest() {

  let selected = [];
  document.querySelectorAll('input[type=checkbox]:checked')
    .forEach(el => selected.push(el.value));

  if (selected.length === 0) {
    alert("Please select at least one service");
    return;
  }

  let room = new URLSearchParams(window.location.search).get("room") || "101";
  let requestID = "REQ-" + Date.now();

  fetch("https://easeguest.app.n8n.cloud/webhook-test/15574ed5-1014-4178-808e-c73265f27b8f", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      request_id: requestID,
      room_number: room,
      services: selected,
      status: "Pending",
      time: new Date().toISOString()
    })
  })
  .then(() => {
    document.getElementById("statusBox").innerHTML =
      "✅ Request Sent<br>ID: " + requestID + "<br>Status: Pending";
  })
  .catch(error => {
    console.log(error);
    alert("Error sending request");
  });
}
</script>

</body>
</html>

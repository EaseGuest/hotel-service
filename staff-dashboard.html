<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #007BFF;
            color: white;
        }
        .update-status {
            cursor: pointer;
            color: blue;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Staff Dashboard</h1>
    <table id="requests">
        <thead>
            <tr>
                <th>Request ID</th>
                <th>Description</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Guest check-in</td>
                <td>Pending</td>
                <td class="update-status" onclick="updateStatus(this)">Update Status</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Room service request</td>
                <td>In Progress</td>
                <td class="update-status" onclick="updateStatus(this)">Update Status</td>
            </tr>
        </tbody>
    </table>
    <script>
        function updateStatus(element) {
            const row = element.parentNode;
            const statusCell = row.cells[2];
            if (statusCell.innerHTML === 'Pending') {
                statusCell.innerHTML = 'In Progress';
            } else if (statusCell.innerHTML === 'In Progress') {
                statusCell.innerHTML = 'Completed';
            } else {
                alert('Status cannot be updated anymore.');
            }
        }
    </script>
</body>
</html>
